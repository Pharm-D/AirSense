        function FadeIn({ children, delay = 0, className = "" }) {
          return (
            <div className={`animate-fade-in ${className}`} style={{ animationDelay: `${delay}ms` }}>
              {children}
            </div>
          );
        }

        function MiniChart({ data, colorHex, gradientId, height = 80 }) {
          const w = 400, h = height;
          const min = Math.min(...data), max = Math.max(...data);
          const coords = data.map((v, i) => [
            (i / (data.length - 1)) * w,
            h - ((v - min) / (max - min || 1)) * (h - 16) - 8
          ]);
          const line = coords.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ");
          const area = `${line} L${w},${h} L0,${h} Z`;
          
          return (
            <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full block drop-shadow-sm">
              <defs>
                <linearGradient id={gradientId} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={colorHex} stopOpacity="0.25" />
                  <stop offset="100%" stopColor={colorHex} stopOpacity="0" />
                </linearGradient>
              </defs>
              <path d={area} fill={`url(#${gradientId})`} className="animate-fade-in" style={{ animationDelay: "300ms" }} />
              <path d={line} fill="none" stroke={colorHex} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="animate-draw" />
              <circle cx={coords[coords.length - 1][0]} cy={coords[coords.length - 1][1]} r="4" fill={colorHex} className="animate-fade-in" style={{ animationDelay: "1500ms" }} />
            </svg>
          );
        }

        function StatusBadge({ status }) {

            stable: { bg: "bg-emerald-500/10", text: "text-emerald-400", border: "border-emerald-500/20", label: "Stable" },

          const s = map[status] || map.stable;
          return (

        function EHMISLogin({ onBack, onLogin }) {
          const [loading, setLoading] = useState(false);
          const [networkStatus, setNetworkStatus] = useState('checking');

        function SymptomLogger({ onClose, onSave }) {
          const [severity, setSeverity] = useState('mild');
          const [selectedSymptoms, setSelectedSymptoms] = useState([]);
          const [notes, setNotes] = useState('');

          const symptomsList = ["Coughing", "Wheezing", "Chest Tightness", "Shortness of Breath", "Woke up at night"];

          const toggleSymptom = (sym) => {
            setSelectedSymptoms(prev => 
              prev.includes(sym) ? prev.filter(s => s !== sym) : [...prev, sym]
            );
          };

          const handleSave = () => {
            if (selectedSymptoms.length === 0 && notes.trim() === '') return;
            
            const newLog = {
              id: Date.now(),
              date: "Just now",
              severity,
              symptoms: selectedSymptoms,
              notes: notes.trim()
            };
            onSave(newLog);
          };

          return (
            <div className="absolute inset-0 z-50 flex flex-col justify-end">
              <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onClick={onClose}></div>

                        <button

                          onClick={() => setSeverity(s.id)}
                          className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all border ${

                        return (

                            className={`px-4 py-2.5 rounded-xl text-sm font-medium transition-all border ${
                              isSelected 
                                ? 'bg-emerald-500/20 text-emerald-300 border-emerald-500/50'

        function CaregiverManagerModal({ patient, onClose, onSave }) {
          const [caregivers, setCaregivers] = useState(patient.caregivers || []);
          const [newName, setNewName] = useState('');
          const [newRelation, setNewRelation] = useState('');
          const [newPhone, setNewPhone] = useState('');
          const [generatedCode, setGeneratedCode] = useState(null);
          const [copied, setCopied] = useState(false);

          const handleGenerateCode = () => {
            if (!newName.trim() || !newPhone.trim()) return;
            const code = `AS-${Math.random().toString(36).substring(2, 6).toUpperCase()}-${Math.floor(10 + Math.random() * 90)}`;
            setGeneratedCode(code);
          };

          const handleConfirmAdd = () => {
            const newCaregiver = {
              id: Date.now(),
              name: newName.trim(),
              relation: newRelation.trim() || "Caregiver",
              phone: newPhone.trim(),
              status: 'pending' 
            };
            setCaregivers([...caregivers, newCaregiver]);
            setNewName('');
            setNewRelation('');
            setNewPhone('');
            setGeneratedCode(null);
            setCopied(false);
          };

          const handleCopy = () => {
            try {
              navigator.clipboard.writeText(generatedCode);
            } catch (err) {
              const textArea = document.createElement("textarea");
              textArea.value = generatedCode;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand("copy");
              document.body.removeChild(textArea);
            }
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          const handleRemove = (id) => {
            setCaregivers(caregivers.filter(c => c.id !== id));
          };

                      <div className="text-3xl font-mono font-bold text-emerald-400 tracking-[0.2em]">
                        {generatedCode}
                      </div>
                      <p className="text-white/40 text-[10px] mt-3 uppercase tracking-wider flex items-center justify-center gap-1">
                        <Clock size={12}/> Expires in 15 minutes
                      </p>
                    </div>

                    <div className="flex gap-3 w-full mb-6">
                      <button onClick={handleCopy} className="flex-1 py-3.5 bg-white/5 border border-white/10 text-white rounded-xl font-bold text-sm hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
                        {copied ? <><CheckCircle2 size={18} className="text-emerald-400"/> Copied</> : <><Copy size={18}/> Copy Code</>}
                      </button>
                      <button className="flex-1 py-3.5 bg-white/5 border border-white/10 text-white rounded-xl font-bold text-sm hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
                        <Share2 size={18}/> Share
                      </button>
                    </div>
                    
                    <button onClick={handleConfirmAdd} className="w-full py-4 bg-emerald-500 text-emerald-950 rounded-2xl font-bold text-base hover:bg-emerald-400 transition-colors shadow-lg shadow-emerald-500/20">
                      Done
                    </button>
                  </div>
                ) : (
                  <>
                    <p className="text-white/60 text-xs mb-6 leading-relaxed">
                      Add or remove trusted individuals who can monitor your respiratory telemetry, receive emergency alerts, and view your medication logs.
                    </p>

                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-6 pb-6">
                      {/* Active Caregivers */}
                      <div>
                        <h4 className="text-sm font-bold text-white/80 mb-3">Active Data Sharing</h4>
                        {caregivers.length === 0 ? (
                          <div className="text-white/40 text-xs italic bg-white/5 p-4 rounded-xl text-center border border-white/5">
                            No caregivers currently have access to your data.
                          </div>
                        ) : (
                          <div className="space-y-3">
                            {caregivers.map(c => (
                              <div key={c.id} className="bg-white/5 border border-white/10 rounded-xl p-4 flex justify-between items-center">
                                <div>
                                  <div className="text-white font-bold text-sm">{c.name}</div>
                                  <div className="text-white/50 text-xs mt-0.5 flex items-center gap-2">
                                    {c.relation} • {c.phone}
                                    {c.status === 'pending' && (
                                      <span className="flex items-center gap-1 text-amber-400 bg-amber-400/10 px-1.5 py-0.5 rounded-md text-[10px] font-bold tracking-wide">
                                        <Clock size={10}/> PENDING LINK

          return (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-[100] p-4 animate-fade-in" onClick={onClose} style={{ animationDuration: '0.2s' }}>
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-lg w-full shadow-2xl animate-fade-in flex flex-col" style={{ animationDelay: '0.1s' }} onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-6">
                  <div><h3 className="text-xl font-bold text-white">Add Clinical Note</h3><p className="text-sm text-slate-400 mt-1">For {patientName}</p></div>
                  <button onClick={onClose} className="p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-full transition-colors"><LogOut size={16} /></button>
                </div>
                <textarea autoFocus value={text} onChange={(e) => setText(e.target.value)} placeholder="Enter consultation details, observations, or action plan..." className="w-full bg-slate-950 border border-slate-800 text-white rounded-2xl p-4 min-h-[160px] mb-6 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 resize-none placeholder:text-slate-600 font-medium" />
                <div className="flex gap-3 mt-auto">
                  <button onClick={onClose} className="flex-1 py-3 bg-slate-800 text-slate-300 rounded-xl font-bold hover:bg-slate-700 transition-colors border border-slate-700">Cancel</button>
                  <button onClick={() => text.trim() && onSave(text.trim())} disabled={!text.trim()} className="flex-1 py-3 bg-emerald-600 disabled:bg-slate-800 disabled:text-slate-500 text-white rounded-xl font-bold hover:bg-emerald-500 transition-colors shadow-lg shadow-emerald-900/20">Save Note</button>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AirSenseApp />);
    </script>
</body>
</html>
